
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Planner IA</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
:root{
  --cream:#FAF8F3;
  --ink:#1A1714;
  --gold:#B8943C;
  --border:rgba(0,0,0,.08);

  --europe:#E8F0FF;
  --america:#EAF7F0;
  --asia:#FFF4E8;
}

body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
}

/* MAP SECTION */
.map-section{
  padding:1rem;
}

#map{
  height:260px;
  border-radius:16px;
  overflow:hidden;
}

/* CONTINENT LABELS */
.continent{
  margin-top:12px;
  padding:10px;
  border-radius:12px;
  font-size:12px;
  font-weight:500;
}

.europe{background:var(--europe);}
.america{background:var(--america);}
.asia{background:var(--asia);}

/* TRIP CARD */
.trip-card{
  margin:12px 1rem;
  padding:14px;
  background:#fff;
  border-radius:14px;
  border:1px solid var(--border);
}

.trip-title{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;
}

.trip-meta{
  font-size:12px;
  opacity:.6;
}

/* HEADER INSIDE TRIP */
.app-header{
  background:var(--ink);
  color:#fff;
  padding:2rem 1rem;
}

.page{display:none;}
.page.active{display:block;}
</style>
</head>

<body>

<!-- PAGE: TRIPS -->
<div id="trips" class="page active">

  <div class="map-section">
    <div id="map"></div>

    <div class="continent europe">Europa</div>
    <div class="continent america">América</div>
    <div class="continent asia">Ásia</div>
  </div>

  <div class="trip-card" onclick="openTrip()">
    <div class="trip-title">Itália 2026</div>
    <div class="trip-meta">Roma • Florença • Veneza</div>
  </div>

</div>

<!-- PAGE: TRIP DETAIL -->
<div id="trip" class="page">
  <div class="app-header">
    <h2>Itália 2026</h2>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const trips = [
  {name:"Itália", coords:[41.9,12.5], continent:"Europa"},
  {name:"Brasil", coords:[-14,-51], continent:"América"},
  {name:"Japão", coords:[36,138], continent:"Ásia"}
];

// MAP
var map = L.map('map',{zoomControl:false}).setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  opacity:0.6
}).addTo(map);

// pastel circles by continent
const colors = {
  "Europa":"#7FAAFF",
  "América":"#7FD1AE",
  "Ásia":"#FFBE7F"
};

// add markers
trips.forEach(t=>{
  L.circleMarker(t.coords,{
    radius:8,
    color:colors[t.continent],
    fillOpacity:0.6
  }).addTo(map).bindPopup(t.name);
});

// DRAW ROUTE (IA SIMPLES)
function distance(a,b){
  return Math.sqrt(
    Math.pow(a[0]-b[0],2)+Math.pow(a[1]-b[1],2)
  );
}

// ordenar por proximidade (nearest neighbor)
let ordered=[trips[0]];
let remaining=[...trips.slice(1)];

while(remaining.length){
  let last=ordered[ordered.length-1];
  let nearest=remaining.reduce((a,b)=>
    distance(last.coords,a.coords)<distance(last.coords,b.coords)?a:b
  );
  ordered.push(nearest);
  remaining=remaining.filter(x=>x!==nearest);
}

// draw line
let latlngs = ordered.map(t=>t.coords);

L.polyline(latlngs,{
  color:"#B8943C",
  weight:2,
  opacity:0.7,
  dashArray:"4"
}).addTo(map);

// NAV
function openTrip(){
  document.getElementById("trips").classList.remove("active");
  document.getElementById("trip").classList.add("active");
}
</script>

</body>
</html>
